<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#0d0d18"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="outlineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#00e5ff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow orbs -->
  <circle cx="150" cy="180" r="350" fill="url(#glowCyan)"/>
  <circle cx="1050" cy="480" r="350" fill="url(#glowPurple)"/>

  <!-- Top-left corner accent -->
  <path d="M 0 0 L 120 0 L 0 120 Z" fill="#00e5ff" fill-opacity="0.08"/>
  <path d="M 1200 630 L 1080 630 L 1200 510 Z" fill="#a855f7" fill-opacity="0.08"/>

  <!-- Badge -->
  <g transform="translate(80, 90)">
    <rect x="0" y="0" width="420" height="46" rx="23" fill="#00e5ff" fill-opacity="0.1" stroke="#00e5ff" stroke-width="1.5"/>
    <text x="210" y="30" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#00e5ff" text-anchor="middle" letter-spacing="3">AGENCIA DIGITAL · IA · SEO · DRONES</text>
  </g>

  <!-- Main title KREATHUR (gradient fill) -->
  <text x="80" y="270" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="140" font-weight="900" fill="url(#textGrad)" letter-spacing="-5">KREATHUR</text>

  <!-- AGENCY outline -->
  <text x="80" y="370" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="84" font-weight="800" fill="none" stroke="url(#outlineGrad)" stroke-width="2.5" letter-spacing="-2">AGENCY</text>

  <!-- Tagline -->
  <text x="80" y="425" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="600" fill="#e0e0e0" letter-spacing="-0.3">Bots IA · SEO · Desarrollo Web · Drones DGAC 4K</text>

  <!-- Guarantee pill -->
  <g transform="translate(80, 475)">
    <rect x="0" y="0" width="660" height="70" rx="16" fill="#00e5ff" fill-opacity="0.08" stroke="#00e5ff" stroke-width="2"/>
    <circle cx="38" cy="35" r="14" fill="#00e5ff"/>
    <text x="38" y="41" font-family="system-ui, sans-serif" font-size="18" font-weight="900" fill="#0a0a0a" text-anchor="middle">%</text>
    <text x="70" y="32" font-family="system-ui, sans-serif" font-size="20" font-weight="900" fill="#00e5ff">GARANTÍA 30 DÍAS</text>
    <text x="70" y="57" font-family="system-ui, sans-serif" font-size="17" font-weight="600" fill="#ffffff">Si no funciona, no pagas · Sin permanencia · Sin letra chica</text>
  </g>

  <!-- Locations + URL -->
  <text x="80" y="590" font-family="system-ui, sans-serif" font-size="20" font-weight="500" fill="#a0a0a0">Pichilemu, Chile 🇨🇱 · Kiel, Alemania 🇩🇪</text>
  <text x="1120" y="590" font-family="system-ui, sans-serif" font-size="26" font-weight="800" fill="#00e5ff" text-anchor="end">kreathur.agency</text>

  <!-- Corner dots -->
  <circle cx="1120" cy="90" r="5" fill="#00e5ff"/>
  <circle cx="1140" cy="90" r="5" fill="#a855f7"/>
  <circle cx="1160" cy="90" r="5" fill="#ffffff" fill-opacity="0.4"/>
</svg>
