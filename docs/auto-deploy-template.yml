name: Deploy to Hostinger (FTP)

# Auto-deploys the static export to www.kreathur.agency on every push to main.
# 100% credenciales en GitHub Secrets — NUNCA en el código.
#
# ONE-TIME SETUP:
#   1. En hPanel (Hostinger) → Files → "FTP Accounts"
#      - Crea una cuenta FTP NUEVA (no uses la principal) con:
#        Username:  deploy@kreathur.agency
#        Password:  (genera una random, copia)
#        Directorio: public_html
#      - Anota el "FTP server" que aparece (ej: ftp.kreathur.agency o
#        srv###.main-hosting.eu)
#
#   2. En GitHub → este repo → Settings → Secrets and variables → Actions:
#      Crear los 3 secrets:
#        FTP_HOST      = ftp.kreathur.agency           (o el server que mostró hPanel)
#        FTP_USERNAME  = deploy@kreathur.agency
#        FTP_PASSWORD  = (la que generaste)
#
#   3. Hacer un commit cualquiera → push a main → ver Actions tab en GitHub
#
# Después de eso, cada `git push origin main` despliega automático en ~60 segundos.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-kreathur-agency
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          missing=0
          for k in FTP_HOST FTP_USERNAME FTP_PASSWORD; do
            v="${!k:-}"
            if [ -z "$v" ]; then
              echo "::error::Secret $k no está configurado. Ver instrucciones en deploy.yml"
              missing=$((missing+1))
            fi
          done
          if [ $missing -gt 0 ]; then exit 1; fi
          echo "✓ Todos los secrets están configurados"

      - name: Upload via FTP (SFTPS recomendado, soporta FTP plano fallback)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          # Subimos el contenido del repo a la raíz del FTP (que ya apunta a public_html)
          local-dir: ./
          server-dir: ./
          # No tocar dotfiles del servidor (excepto .htaccess que sí necesitamos)
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/README.md
            **/docs/**
          # Si un archivo en remoto no está en local, BORRARLO (para que /servicios y /quienes-somos lleguen)
          dangerous-clean-slate: false
          # Log compacto
          log-level: standard
          # Si FTPS falla, intentar FTP plano en otro puerto (algunas hostings legacy)
          # security: loose  # uncomment if needed

      - name: Smoke-test live URLs
        if: success()
        run: |
          sleep 30
          PASS=0; FAIL=0
          for path in / /inicio /quienes-somos /servicios /blog; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" -L "https://www.kreathur.agency${path}")
            echo "  https://www.kreathur.agency${path} → $CODE"
            if [ "$CODE" = "200" ]; then
              PASS=$((PASS+1))
            else
              FAIL=$((FAIL+1))
              echo "::warning::${path} returned $CODE"
            fi
          done
          echo
          echo "Result: $PASS rutas OK, $FAIL con problemas"
          if [ $FAIL -gt 0 ]; then
            echo "::notice::Algunas rutas no devolvieron 200 — el CDN/cache puede tardar 1-2 min en propagar."
          fi
